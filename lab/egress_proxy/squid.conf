# Squid egress allowlist for Auriga's outbound LLM traffic.
#
# Only HTTPS CONNECT to whitelisted hosts on 443 is permitted.
# Everything else is dropped — including DNS, plain HTTP, and any host
# not explicitly listed.
#
# Auriga reaches squid on port 3128 (HTTP CONNECT). Auriga is configured
# with HTTPS_PROXY=http://egress-proxy:3128 in compose, so the Anthropic
# SDK (which uses httpx internally) routes through this proxy.

http_port 3128

# Logging — every CONNECT (allowed or denied) is recorded for audit.
access_log /var/log/squid/access.log squid
cache deny all

# Allowed destinations.
acl Allowed_Hosts dstdomain api.anthropic.com
acl Allowed_Hosts dstdomain api.openai.com
acl Allowed_Hosts dstdomain generativelanguage.googleapis.com
acl Allowed_Hosts dstdomain openrouter.ai

# Allowed methods + ports.
acl SSL_ports port 443
acl CONNECT_method method CONNECT

# Block plaintext / non-CONNECT to everything.
http_access deny !CONNECT_method
http_access deny !SSL_ports

# Allow only CONNECT to allowlist on 443.
http_access allow CONNECT_method SSL_ports Allowed_Hosts

# Default deny.
http_access deny all

# Don't reveal anything to the client.
forwarded_for delete
via off
httpd_suppress_version_string on
